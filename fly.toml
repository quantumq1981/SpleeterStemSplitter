# fly.toml app configuration file generated for spleeterstemsplitter-gie4tw on 2026-02-23T17:07:05Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'spleeterstemsplitter-gie4tw'
primary_region = 'ams'

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  # Health check — give startup time for migrations + collectstatic
  [http_service.checks]
    [http_service.checks.health]
      interval = "15s"
      timeout = "10s"
      grace_period = "120s"
      method = "GET"
      path = "/api/health/"

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
